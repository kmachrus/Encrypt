<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }
        
        .box {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .drop-zone {
            border: 3px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .drop-zone:hover {
            border-color: #4ade80;
            background: rgba(74,222,128,0.1);
        }
        
        input[type="file"] {
            display: none;
        }
        
        img {
            max-width: 100%;
            border-radius: 8px;
            display: none;
            margin-top: 15px;
        }
        
        textarea {
            width: 100%;
            min-height: 100px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px;
            color: #4ade80;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
            margin-top: 10px;
        }
        
        .btn {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 1rem;
            transition: opacity 0.3s;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        
        .preview-area {
            min-height: 150px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            border: 2px dashed rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .divider {
            text-align: center;
            margin: 15px 0;
            opacity: 0.6;
            font-size: 0.9rem;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Loading Animation */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 12px;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: #4ade80;
            border-right-color: #4ade80;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .progress-container {
            width: 80%;
            max-width: 250px;
            text-align: center;
        }
        
        .progress-text {
            font-size: 2rem;
            font-weight: bold;
            color: #4ade80;
            font-family: monospace;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(74,222,128,0.2);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(74,222,128,0.5);
        }
        
        .loading-status {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 12px;
            font-weight: 500;
        }
        
        .filename-display {
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-top: 15px;
            word-break: break-all;
            border-left: 3px solid #4ade80;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #000;
            color: #4ade80;
            padding: 15px 30px;
            border-radius: 10px;
            transition: 0.3s;
            z-index: 1000;
            font-weight: 600;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .badge {
            display: inline-block;
            background: #25d366;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        .quality-badge {
            display: inline-block;
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Converter <span class="badge">JPEG HD</span></h1>
        
        <!-- ENCODE -->
        <div class="box">
            <h3 style="margin-bottom: 15px;">📁 → 📄 Convert</h3>
            
            <div class="drop-zone" id="encodeZone" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*">
                
                <div id="encodePlaceholder">
                    <p style="font-size: 2.5rem; margin-bottom: 10px;">📁</p>
                    <p>Drop atau klik untuk pilih gambar</p>
                    <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 8px;">
                        JPEG Quality 90% <span class="quality-badge">HD</span> • Auto-resize jika >800KB
                    </p>
                </div>
                
                <img id="preview">
                
                <!-- Loading Overlay Encode -->
                <div class="loading-overlay hidden" id="encodeLoading">
                    <div class="spinner"></div>
                    <div class="progress-container">
                        <div class="progress-text" id="encodeProgressText">0%</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="encodeProgressFill"></div>
                        </div>
                        <div class="loading-status" id="encodeStatus">Membaca file...</div>
                    </div>
                </div>
            </div>
            
            <div class="filename-display hidden" id="filenameDisplay">
                <div id="filenameText"></div>
                <div class="stats-row">
                    <span id="originalSize"></span>
                    <span id="finalSize"></span>
                </div>
                <div class="stats-row" id="dimensionRow" style="display: none;">
                    <span id="originalDim"></span>
                    <span id="finalDim"></span>
                </div>
            </div>
            
            <button class="btn hidden" id="shareBtn" onclick="shareFile()">📤 Share</button>
        </div>
        
        <!-- DECODE -->
        <div class="box">
            <h3 style="margin-bottom: 15px;">📄 → 🖼️ Restore</h3>
            
            <div class="drop-zone" onclick="document.getElementById('txtInput').click()">
                <input type="file" id="txtInput" accept=".txt">
                <p>📄 Drop atau klik untuk upload .txt</p>
            </div>
            
            <div class="divider">— atau paste kode —</div>
            
            <textarea id="codeInput" placeholder="Paste kode Base64 di sini..."></textarea>
            
            <div class="input-group">
                <button class="btn btn-small btn-secondary" onclick="pasteFromClipboard()" style="flex: 1;">
                    📋 Paste
                </button>
                <button class="btn btn-small" id="convertBtn" onclick="startDecode()" style="flex: 2;">
                    🔄 Proses
                </button>
            </div>
            
            <div class="preview-area" id="previewArea">
                <p style="opacity: 0.5;" id="placeholderText">Hasil muncul di sini</p>
                <img id="resultImg">
                
                <!-- Loading Overlay Decode -->
                <div class="loading-overlay hidden" id="decodeLoading">
                    <div class="spinner"></div>
                    <div class="progress-container">
                        <div class="progress-text" id="decodeProgressText">0%</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="decodeProgressFill"></div>
                        </div>
                        <div class="loading-status" id="decodeStatus">Memvalidasi kode...</div>
                    </div>
                </div>
            </div>
            
            <button class="btn btn-secondary hidden" id="dlBtn" onclick="downloadResult()">💾 Simpan Gambar</button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const MAX_SIZE = 800 * 1024; // 800KB
        const JPEG_QUALITY = 0.9; // High quality
        let txtBlob = null;
        let randomFilename = '';
        
        function generateRandomName() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result + '.txt';
        }
        
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        function updateProgress(loadingType, percent, status) {
            const textEl = document.getElementById(loadingType + 'ProgressText');
            const fillEl = document.getElementById(loadingType + 'ProgressFill');
            const statusEl = document.getElementById(loadingType + 'Status');
            
            textEl.textContent = percent + '%';
            fillEl.style.width = percent + '%';
            statusEl.textContent = status;
        }
        
        // ========== ENCODE WITH JPEG COMPRESSION ==========
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const encodeLoading = document.getElementById('encodeLoading');
        
        fileInput.addEventListener('change', async (e) => {
            if (!e.target.files[0]) return;
            
            const file = e.target.files[0];
            randomFilename = generateRandomName();
            
            // Show loading
            encodeLoading.classList.remove('hidden');
            updateProgress('encode', 10, 'Membaca file...');
            
            const originalSize = file.size;
            
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const img = new Image();
                img.onload = async () => {
                    const originalWidth = img.width;
                    const originalHeight = img.height;
                    
                    updateProgress('encode', 30, 'Memeriksa ukuran...');
                    await sleep(200);
                    
                    let finalDataUrl = ev.target.result;
                    let wasOptimized = false;
                    let finalSize = originalSize;
                    let finalWidth = originalWidth;
                    let finalHeight = originalHeight;
                    
                    // Check if need optimization (file size > 800KB)
                    if (originalSize > MAX_SIZE) {
                        wasOptimized = true;
                        updateProgress('encode', 50, 'Mengoptimasi gambar...');
                        
                        // Calculate scale to fit ~800KB with JPEG quality 0.9
                        // JPEG size roughly proportional to pixel count at same quality
                        const targetPixels = (MAX_SIZE / originalSize) * (originalWidth * originalHeight) * 0.85; // 0.85 buffer for safety
                        const scale = Math.sqrt(targetPixels / (originalWidth * originalHeight));
                        
                        // Calculate new dimensions (aspect ratio tetap)
                        finalWidth = Math.floor(originalWidth * scale);
                        finalHeight = Math.floor(originalHeight * scale);
                        
                        // Minimum dimensions check (jangan terlalu kecil)
                        const minDimension = 600;
                        if (finalWidth < minDimension || finalHeight < minDimension) {
                            const minScale = Math.max(minDimension / originalWidth, minDimension / originalHeight);
                            finalWidth = Math.floor(originalWidth * minScale);
                            finalHeight = Math.floor(originalHeight * minScale);
                        }
                        
                        // Create canvas with exact aspect ratio
                        const canvas = document.createElement('canvas');
                        canvas.width = finalWidth;
                        canvas.height = finalHeight;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        
                        // Draw with proper aspect ratio (cover entire canvas)
                        ctx.drawImage(img, 0, 0, finalWidth, finalHeight);
                        
                        await sleep(300);
                        updateProgress('encode', 70, 'Mengkonversi ke JPEG (Q:90%)...');
                        
                        // Get JPEG with quality 0.9
                        finalDataUrl = canvas.toDataURL('image/jpeg', JPEG_QUALITY);
                        
                        // Check actual size
                        finalSize = Math.round((finalDataUrl.length * 3) / 4);
                        
                        // If still too big, reduce resolution more (tetap quality 0.9)
                        let attempts = 0;
                        while (finalSize > MAX_SIZE && attempts < 3) {
                            const extraScale = 0.9; // Reduce 10% each attempt
                            finalWidth = Math.floor(finalWidth * extraScale);
                            finalHeight = Math.floor(finalHeight * extraScale);
                            
                            canvas.width = finalWidth;
                            canvas.height = finalHeight;
                            ctx.drawImage(img, 0, 0, finalWidth, finalHeight);
                            finalDataUrl = canvas.toDataURL('image/jpeg', JPEG_QUALITY);
                            finalSize = Math.round((finalDataUrl.length * 3) / 4);
                            attempts++;
                        }
                    }
                    
                    updateProgress('encode', 90, 'Menyiapkan file...');
                    await sleep(200);
                    
                    // Create blob and download
                    txtBlob = new Blob([finalDataUrl], { type: 'text/plain' });
                    
                    const url = URL.createObjectURL(txtBlob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = randomFilename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    updateProgress('encode', 100, 'Selesai!');
                    await sleep(300);
                    
                    // Hide loading, show result
                    encodeLoading.classList.add('hidden');
                    preview.src = finalDataUrl;
                    preview.style.display = 'block';
                    document.getElementById('encodePlaceholder').style.display = 'none';
                    
                    // Show filename with stats
                    const nameDisplay = document.getElementById('filenameDisplay');
                    document.getElementById('filenameText').textContent = `📄 ${randomFilename}`;
                    document.getElementById('originalSize').textContent = `Original: ${formatBytes(originalSize)}`;
                    document.getElementById('finalSize').textContent = wasOptimized ? 
                        `JPEG Q90%: ${formatBytes(finalSize)}` : `Size: ${formatBytes(finalSize)}`;
                    
                    // Show dimensions if optimized
                    if (wasOptimized) {
                        document.getElementById('dimensionRow').style.display = 'flex';
                        document.getElementById('originalDim').textContent = `${originalWidth}×${originalHeight}`;
                        document.getElementById('finalDim').textContent = `${finalWidth}×${finalHeight}`;
                    }
                    
                    nameDisplay.classList.remove('hidden');
                    document.getElementById('shareBtn').classList.remove('hidden');
                    
                    showToast(wasOptimized ? 
                        `✅ Dioptimasi: ${originalWidth}×${originalHeight} → ${finalWidth}×${finalHeight}` : 
                        '✅ Berhasil convert!');
                };
                
                img.onerror = () => {
                    encodeLoading.classList.add('hidden');
                    showToast('❌ Gagal membaca gambar');
                };
                
                img.src = ev.target.result;
            };
            
            reader.onerror = () => {
                encodeLoading.classList.add('hidden');
                showToast('❌ Gagal membaca file');
            };
            
            reader.readAsDataURL(file);
        });
        
        async function shareFile() {
            if (!txtBlob) return;
            
            const file = new File([txtBlob], randomFilename, { type: 'text/plain' });
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({ files: [file], title: 'File', text: randomFilename });
                } catch (err) {
                    if (err.name !== 'AbortError') fallbackShare();
                }
            } else {
                fallbackShare();
            }
        }
        
        function fallbackShare() {
            txtBlob.text().then(text => {
                navigator.clipboard.writeText(text.substring(0, 50000));
                showToast('📋 Isi file dicopy (50KB pertama)');
            });
        }
        
        // ========== DECODE ==========
        const txtInput = document.getElementById('txtInput');
        const resultImg = document.getElementById('resultImg');
        const previewArea = document.getElementById('previewArea');
        const codeInput = document.getElementById('codeInput');
        const decodeLoading = document.getElementById('decodeLoading');
        const convertBtn = document.getElementById('convertBtn');
        
        txtInput.addEventListener('change', (e) => {
            if (!e.target.files[0]) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                codeInput.value = ev.target.result.trim();
                startDecode();
            };
            reader.readAsText(e.target.files[0]);
        });
        
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                codeInput.value = text;
                showToast('📋 Tersalin');
                startDecode();
            } catch (err) {
                showToast('❌ Gagal akses clipboard');
            }
        }
        
        async function startDecode() {
            const code = codeInput.value.trim();
            if (!code) {
                showToast('❌ Masukkan kode!');
                return;
            }
            
            decodeLoading.classList.remove('hidden');
            convertBtn.disabled = true;
            
            const steps = [
                { percent: 10, status: 'Memvalidasi kode...' },
                { percent: 25, status: 'Memparsing data...' },
                { percent: 40, status: 'Mendekode base64...' },
                { percent: 60, status: 'Memuat gambar...' },
                { percent: 80, status: 'Merender...' },
                { percent: 100, status: 'Selesai!' }
            ];
            
            let imageSrc = code;
            if (!code.startsWith('data:')) {
                imageSrc = 'data:image/jpeg;base64,' + code;
            }
            
            // Animate progress
            for (let step of steps) {
                updateProgress('decode', step.percent, step.status);
                await sleep(120);
            }
            
            resultImg.src = imageSrc;
            
            resultImg.onload = () => {
                resultImg.style.display = 'block';
                document.getElementById('placeholderText').style.display = 'none';
                previewArea.style.border = '2px solid #4ade80';
                document.getElementById('dlBtn').classList.remove('hidden');
                
                setTimeout(() => {
                    decodeLoading.classList.add('hidden');
                    convertBtn.disabled = false;
                    showToast('✅ Berhasil restore!');
                }, 300);
            };
            
            resultImg.onerror = () => {
                decodeLoading.classList.add('hidden');
                convertBtn.disabled = false;
                showToast('❌ Kode tidak valid');
            };
        }
        
        function downloadResult() {
            const a = document.createElement('a');
            a.href = resultImg.src;
            a.download = 'restored.jpg';
            a.click();
            showToast('💾 Gambar tersimpan');
        }
        
        // ========== DRAG DROP ==========
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.style.borderColor = '#4ade80';
            });
            zone.addEventListener('dragleave', () => {
                zone.style.borderColor = 'rgba(255,255,255,0.3)';
            });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.style.borderColor = 'rgba(255,255,255,0.3)';
                const input = zone.querySelector('input');
                if (e.dataTransfer.files[0]) {
                    input.files = e.dataTransfer.files;
                    input.dispatchEvent(new Event('change'));
                }
            });
        });
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
