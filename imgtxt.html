<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }
        
        .box {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .drop-zone {
            border: 3px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .drop-zone:hover {
            border-color: #4ade80;
            background: rgba(74,222,128,0.1);
        }
        
        input[type="file"] {
            display: none;
        }
        
        img {
            max-width: 100%;
            border-radius: 8px;
            display: none;
            margin-top: 15px;
        }
        
        textarea {
            width: 100%;
            min-height: 100px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px;
            color: #4ade80;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
            margin-top: 10px;
        }
        
        .btn {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 1rem;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        
        .preview-area {
            min-height: 150px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            border: 2px dashed rgba(255,255,255,0.1);
        }
        
        .divider {
            text-align: center;
            margin: 15px 0;
            opacity: 0.6;
            font-size: 0.9rem;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #000;
            color: #4ade80;
            padding: 12px 24px;
            border-radius: 8px;
            transition: 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .filename-display {
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Converter</h1>
        
        <!-- ENCODE -->
        <div class="box">
            <h3 style="margin-bottom: 15px;">📁 → 📄 Convert</h3>
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*">
                <p>Drop atau klik untuk pilih file</p>
                <img id="preview">
            </div>
            <div class="filename-display hidden" id="filenameDisplay"></div>
            <button class="btn hidden" id="shareBtn" onclick="shareFile()">📤 Share</button>
        </div>
        
        <!-- DECODE -->
        <div class="box">
            <h3 style="margin-bottom: 15px;">📄 → 🖼️ Restore</h3>
            
            <div class="drop-zone" onclick="document.getElementById('txtInput').click()">
                <input type="file" id="txtInput" accept=".txt">
                <p>Drop atau klik untuk upload .txt</p>
            </div>
            
            <div class="divider">— atau paste kode —</div>
            
            <textarea id="codeInput" placeholder="Paste kode di sini..."></textarea>
            
            <div class="input-group">
                <button class="btn btn-small btn-secondary" onclick="pasteFromClipboard()" style="flex: 1;">
                    📋 Paste
                </button>
                <button class="btn btn-small" onclick="convertCode()" style="flex: 2;">
                    🔄 Proses
                </button>
            </div>
            
            <div class="preview-area" id="previewArea">
                <p style="opacity: 0.5;">Hasil muncul di sini</p>
                <img id="resultImg">
            </div>
            
            <button class="btn btn-secondary hidden" id="dlBtn" onclick="downloadResult()">💾 Simpan</button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        let txtBlob = null;
        let randomFilename = '';
        
        // Generate random filename (8 chars, letters + numbers)
        function generateRandomName() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 8; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result + '.txt';
        }
        
        // ========== ENCODE ==========
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        
        fileInput.addEventListener('change', (e) => {
            if (!e.target.files[0]) return;
            
            const file = e.target.files[0];
            
            // Generate random filename
            randomFilename = generateRandomName();
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                // Create blob
                txtBlob = new Blob([ev.target.result], { type: 'text/plain' });
                
                // Auto download with random name
                const url = URL.createObjectURL(txtBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = randomFilename;
                a.click();
                URL.revokeObjectURL(url);
                
                // Show preview
                preview.src = ev.target.result;
                preview.style.display = 'block';
                
                // Show filename
                const nameDisplay = document.getElementById('filenameDisplay');
                nameDisplay.textContent = `📄 ${randomFilename}`;
                nameDisplay.classList.remove('hidden');
                
                // Show share button
                document.getElementById('shareBtn').classList.remove('hidden');
                
                showToast('✅ Berhasil convert!');
            };
            reader.readAsDataURL(file);
        });
        
        async function shareFile() {
            if (!txtBlob) return;
            
            const file = new File([txtBlob], randomFilename, { type: 'text/plain' });
            
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'File',
                        text: randomFilename
                    });
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        showToast('❌ Gagal share');
                    }
                }
            } else {
                const text = await txtBlob.text();
                navigator.clipboard.writeText(text);
                showToast('📋 Tersalin ke clipboard');
            }
        }
        
        // ========== DECODE ==========
        const txtInput = document.getElementById('txtInput');
        const resultImg = document.getElementById('resultImg');
        const previewArea = document.getElementById('previewArea');
        const codeInput = document.getElementById('codeInput');
        
        txtInput.addEventListener('change', (e) => {
            if (!e.target.files[0]) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                codeInput.value = ev.target.result.trim();
                convertCode();
            };
            reader.readAsText(e.target.files[0]);
        });
        
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                codeInput.value = text;
                showToast('📋 Tersalin');
                convertCode();
            } catch (err) {
                showToast('❌ Gagal akses clipboard');
            }
        }
        
        function convertCode() {
            const code = codeInput.value.trim();
            if (!code) {
                showToast('❌ Masukkan kode!');
                return;
            }
            
            let imageSrc = code;
            if (!code.startsWith('data:')) {
                imageSrc = 'data:image/png;base64,' + code;
            }
            
            resultImg.src = imageSrc;
            resultImg.onload = () => {
                resultImg.style.display = 'block';
                previewArea.querySelector('p').style.display = 'none';
                previewArea.style.border = '2px solid #4ade80';
                document.getElementById('dlBtn').classList.remove('hidden');
                showToast('✅ Berhasil restore!');
            };
            resultImg.onerror = () => {
                showToast('❌ Kode tidak valid');
            };
        }
        
        function downloadResult() {
            const a = document.createElement('a');
            a.href = resultImg.src;
            a.download = 'restored.png';
            a.click();
            showToast('💾 Tersimpan');
        }
        
        // ========== DRAG DROP ==========
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.style.borderColor = '#4ade80';
            });
            zone.addEventListener('dragleave', () => {
                zone.style.borderColor = 'rgba(255,255,255,0.3)';
            });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.style.borderColor = 'rgba(255,255,255,0.3)';
                const input = zone.querySelector('input');
                if (e.dataTransfer.files[0]) {
                    input.files = e.dataTransfer.files;
                    input.dispatchEvent(new Event('change'));
                }
            });
        });
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
